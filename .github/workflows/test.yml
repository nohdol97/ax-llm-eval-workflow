# ─────────────────────────────────────────────────────────────────────
# ax-llm-eval-workflow — CI 테스트 파이프라인
#
# 잡 구성 (BUILD_ORDER.md 작업 0-4, TEST_SPEC.md §0.4 참조):
#   - lint               : ruff / eslint / tsc --noEmit (병렬)
#   - backend-unit       : pytest -m unit + 커버리지
#   - backend-integration: services 블록(postgres/redis/clickhouse) + pytest -m integration
#   - frontend-unit      : eslint / vitest / tsc
#
# 트리거:
#   - main 브랜치로 push
#   - main 으로의 PR
#   - 수동 dispatch
# ─────────────────────────────────────────────────────────────────────

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 동일 ref 의 후속 push 시 진행 중인 워크플로우 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 기본 권한 최소화
permissions:
  contents: read

jobs:
  # ── lint (모든 잡과 병렬 — 빠른 피드백) ──────────────────────────
  lint:
    name: lint (ruff + eslint + tsc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Python (ruff)
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dev deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: ruff check
        working-directory: backend
        run: ruff check .

      # Node (eslint + tsc)
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: eslint
        working-directory: frontend
        run: npm run lint

      - name: tsc --noEmit
        working-directory: frontend
        run: npm run typecheck

  # ── backend-unit (외부 의존성 없는 단위 테스트) ──────────────────
  backend-unit:
    name: backend unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend test deps
        working-directory: backend
        run: pip install -e ".[test,dev]"

      - name: ruff check
        working-directory: backend
        run: ruff check .

      - name: pytest (unit)
        working-directory: backend
        run: |
          pytest -m unit -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-coverage
          path: backend/coverage.xml
          if-no-files-found: warn
          retention-days: 7

  # ── backend-integration (services: postgres/redis/clickhouse) ────
  # 본 프로젝트는 사내 Langfuse/LiteLLM/ClickHouse를 사용하지만, CI에서는
  # Mock 또는 가벼운 컨테이너로 대체한다. 통합 테스트는 Mock fixture와
  # 실제 redis/postgres/clickhouse 인스턴스에 대한 연결 테스트에 한정한다.
  backend-integration:
    name: backend integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        # GitHub Actions services는 native healthcheck를 지원한다.
        # wait-for-it 패턴 대신 healthcheck로 ready 대기.
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping | grep -q PONG"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      clickhouse:
        image: clickhouse/clickhouse-server:24-alpine
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: clickhouse
          CLICKHOUSE_DB: langfuse
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    env:
      # 통합 테스트가 services 블록의 컨테이너에 접근하기 위한 환경변수
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      REDIS_PASSWORD: ""
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_READONLY_USER: default
      CLICKHOUSE_READONLY_PASSWORD: clickhouse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend test deps
        working-directory: backend
        run: pip install -e ".[test,dev]"

      - name: pytest (integration)
        working-directory: backend
        run: pytest -m integration -v

  # ── frontend-unit (vitest + lint + tsc) ──────────────────────────
  frontend-unit:
    name: frontend unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: eslint
        working-directory: frontend
        run: npm run lint

      - name: vitest (unit)
        working-directory: frontend
        run: npm run test

      - name: tsc --noEmit
        working-directory: frontend
        run: npm run typecheck
