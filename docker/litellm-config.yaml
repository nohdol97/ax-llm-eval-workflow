# LiteLLM Proxy 설정
# 멀티 프로바이더 LLM Gateway 구성
#
# 주의사항:
#   - success_callback에 Langfuse를 추가하지 않음 (Labs Backend가 trace 기록 전담)
#   - API 키는 환경변수로 주입 (이 파일에 직접 입력 금지)
#   - Master Key는 최소 32자, 90일 로테이션 필수

model_list:
  # ── Azure OpenAI ─────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: azure/gpt-4o
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE
      api_version: os.environ/AZURE_API_VERSION

  - model_name: gpt-4.1
    litellm_params:
      model: azure/gpt-4.1
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE
      api_version: os.environ/AZURE_API_VERSION

  # ── Google Gemini ────────────────────────────────────────────────
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-preview-05-06
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash-preview-05-20
      api_key: os.environ/GEMINI_API_KEY

  # ── Anthropic (Claude) ──────────────────────────────────────────
  - model_name: claude-4.5-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-4-opus
    litellm_params:
      model: anthropic/claude-opus-4-6-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── OpenAI Direct ───────────────────────────────────────────────
  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o3
    litellm_params:
      model: openai/o3
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o4-mini
    litellm_params:
      model: openai/o4-mini
      api_key: os.environ/OPENAI_API_KEY

# ── 일반 설정 ──────────────────────────────────────────────────────
litellm_settings:
  # Master Key (환경변수에서 주입)
  master_key: os.environ/LITELLM_MASTER_KEY

  # 요청 제한 (초당/분당)
  max_budget: 100  # USD 일일 예산 상한
  num_retries: 2
  request_timeout: 120  # 초

  # Langfuse callback 비활성화 — Labs Backend가 trace 기록 전담
  success_callback: []

  # 캐시 설정 (동일 요청 비용 절감)
  cache: false  # 실험 워크플로우에서는 캐시 비활성화 (매번 새로운 응답 필요)

  # 로깅
  set_verbose: false

general_settings:
  # 마스터 키 인증 필수
  master_key: os.environ/LITELLM_MASTER_KEY
