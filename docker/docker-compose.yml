# ─────────────────────────────────────────────────────────────────────
# ax-llm-eval-workflow — 베이스 docker-compose
#
# 본 프로젝트는 사내 공용 인프라(Langfuse / LiteLLM / Prometheus / OTel
# Collector / Loki / ClickHouse)를 외부 엔드포인트로 참조한다. 따라서 본
# compose는 자체 운영 컴포넌트만 정의한다.
#
# 자체 운영 대상:
#   - backend  : FastAPI 백엔드 (자체 빌드)
#   - frontend : Next.js 15 프론트엔드 (자체 빌드)
#   - redis    : (선택) 사내 Redis 임차 거부 시에만 활성화 — 기본은
#                주석 처리된 정의로 유지하고, 자체 운영 모드에서는
#                profile=self-hosted-redis로 활성화한다.
#
# 네트워크 구조:
#   frontend_net : 외부 노출 (frontend → 사내 reverse proxy)
#   backend_net  : 내부 통신 (backend, redis 옵션). 사내 공용 서비스로의
#                  egress는 사내 VPC/방화벽 정책에 의존.
#
# 기동 명령:
#   - 개발 : docker compose -f docker/docker-compose.yml \
#              -f docker/docker-compose.override.yml up -d
#   - 데모 : docker compose -f docker/docker-compose.yml \
#              -f docker/docker-compose.demo.yml \
#              --env-file docker/.env.demo up -d
#   - 운영 : docker compose -f docker/docker-compose.yml \
#              -f docker/docker-compose.prod.yml \
#              --env-file docker/.env.production up -d
#
# 참고: BUILD_ORDER.md Phase 1 작업 1-1
# ─────────────────────────────────────────────────────────────────────

services:
  # ── Backend (FastAPI) ───────────────────────────────────────────
  # 사내 공용 서비스(Langfuse/LiteLLM/ClickHouse/Prometheus/OTel/Loki)는
  # depends_on에 포함하지 않는다. Backend 부팅 시 헬스체크 + 재시도로
  # 도달성을 확인한다 (작업 1-1, 1-8 참조).
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ax-llm-eval-workflow-backend:${LABS_IMAGE_TAG:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      # 환경 식별 (override/demo/prod에서 값 변경)
      - LABS_ENV=${LABS_ENV:-development}
      - LABS_LOG_FORMAT=${LABS_LOG_FORMAT:-json}
      - LABS_LOG_LEVEL=${LABS_LOG_LEVEL:-INFO}
      # OTel sampler 기본값 (운영 0.1 / 개발 0.0 / 데모 1.0은 override에서)
      - OTEL_TRACES_SAMPLER=${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      - OTEL_TRACES_SAMPLER_ARG=${OTEL_TRACES_SAMPLER_ARG:-0.1}
    expose:
      - "8000"
    networks:
      - backend_net
      - frontend_net
    healthcheck:
      # Backend는 사내 인프라 헬스체크 + score config 등록을 시작 시 수행하므로
      # start_period를 길게 잡고 retries도 넉넉하게 설정한다.
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # depends_on은 자체 운영 redis(옵션)만 대상. 사내 서비스는 미포함.
    # redis는 profile=self-hosted-redis 활성 시에만 기동되며, 비활성 시
    # required:false로 인해 본 의존성은 무시된다.
    depends_on:
      redis:
        condition: service_healthy
        required: false

  # ── Frontend (Next.js 15) ───────────────────────────────────────
  # frontend는 backend와만 통신한다. 사내 reverse proxy를 통해
  # 외부에 노출되므로 frontend_net에만 연결한다.
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: ax-llm-eval-workflow-frontend:${LABS_IMAGE_TAG:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - LABS_ENV=${LABS_ENV:-development}
    expose:
      - "3100"
    networks:
      - frontend_net
    healthcheck:
      # Next.js standalone 모드에서 /api/health 라우트(작업 2-x)가 응답한다 가정.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ── (옵션) Redis 7 ──────────────────────────────────────────────
  # 사내 Redis 임차 시 본 서비스를 비활성화한다. 자체 운영 모드에서만
  # profile로 활성화한다:
  #   docker compose --profile self-hosted-redis -f ... up -d
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    profiles:
      # 기본 기동에서는 비활성. 자체 운영 모드에서만 명시적 활성.
      - self-hosted-redis

# ── 볼륨 ─────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local

# ── 네트워크 ─────────────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
    # 사내 reverse proxy에서 본 네트워크에 도달 가능해야 한다.
  backend_net:
    driver: bridge
    # 내부 통신 전용. 사내 공용 서비스로의 egress는 사내 네트워크 정책에 의존.
