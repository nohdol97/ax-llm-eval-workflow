# ax-llm-eval-workflow Docker Compose 구성
# 개발 환경용 전체 서비스 스택
#
# 네트워크 구조:
#   frontend_net (외부 노출) - frontend, backend
#   backend_net  (internal)  - backend, litellm, langfuse, postgres, clickhouse, redis

services:
  # ── Frontend (Next.js) ────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - frontend_net
    restart: unless-stopped

  # ── Backend (FastAPI) ─────────────────────────────────────────────
  # frontend_net + backend_net 양쪽에 연결하여 게이트웨이 역할 수행
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - LITELLM_BASE_URL=http://litellm:4000
      - LANGFUSE_HOST=http://langfuse:3000
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
      langfuse:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Evaluator 샌드박스 컨테이너 관리용
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped

  # ── LiteLLM Proxy ────────────────────────────────────────────────
  # 멀티 프로바이더 LLM Gateway (내부 전용, 외부 노출 금지)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    expose:
      - "4000"
    env_file:
      - ../.env
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Langfuse v3 ──────────────────────────────────────────────────
  # 프롬프트 관리, Trace/Score 저장, 데이터셋 관리
  langfuse:
    image: langfuse/langfuse:3
    expose:
      - "3000"
    env_file:
      - ../.env
    environment:
      # PostgreSQL 연결
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # ClickHouse 연결
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      # Redis 연결
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${REDIS_PASSWORD:-}
      # Langfuse 설정
      - NEXTAUTH_URL=http://langfuse:3000
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - SALT=${LANGFUSE_SALT}
      - LANGFUSE_INIT_ORG_ID=${LANGFUSE_INIT_ORG_ID:-}
      - LANGFUSE_INIT_PROJECT_ID=${LANGFUSE_INIT_PROJECT_ID:-}
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── PostgreSQL 15 ─────────────────────────────────────────────────
  # Langfuse 메타데이터 저장 (프로젝트, 사용자, 프롬프트 정의, 데이터셋 정의)
  postgres:
    image: postgres:15-alpine
    expose:
      - "5432"
    env_file:
      - ../.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-langfuse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── ClickHouse ────────────────────────────────────────────────────
  # Langfuse 시계열 분석 데이터 (Trace, Generation, Score, 비용, 지연 시간)
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    expose:
      - "8123"
      - "9000"
    env_file:
      - ../.env
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-langfuse}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./scripts/setup-clickhouse-readonly.sh:/docker-entrypoint-initdb.d/setup-readonly.sh:ro
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ── Redis 7 ───────────────────────────────────────────────────────
  # Langfuse 이벤트 인제스트 큐 + Labs 실험 상태/진행률 (TTL 24시간)
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    env_file:
      - ../.env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

# ── 볼륨 ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  redis_data:
    driver: local

# ── 네트워크 ─────────────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
    # 외부 접근 가능 (frontend, backend)
  backend_net:
    driver: bridge
    internal: true
    # 외부 접근 차단 (litellm, langfuse, postgres, clickhouse, redis)
